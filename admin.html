<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Store Admin — Caption Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #0d0d0f;
  --surface:   #141416;
  --surface2:  #1c1c1f;
  --border:    #2a2a2e;
  --orange:    #ff6b35;
  --orange2:   #e85d26;
  --green:     #22c55e;
  --red:       #ef4444;
  --text:      #f0f0f2;
  --muted:     #72727a;
  --mono:      'JetBrains Mono', monospace;
  --sans:      'Space Grotesk', sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px;
  background: rgba(13,13,15,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: white;
}
.brand-name { font-size: 15px; font-weight: 600; }
.brand-name span { color: var(--orange); }
.topbar-actions { display: flex; gap: 8px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-ghost {
  background: transparent; color: var(--muted); border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--orange); }
.btn-orange {
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  color: white; box-shadow: 0 4px 14px rgba(255,107,53,0.3);
}
.btn-orange:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
.btn-green  { background: var(--green); color: white; }
.btn-green:hover { opacity: 0.9; }
.btn-red    { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-red:hover { background: rgba(239,68,68,0.1); }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.btn-icon { padding: 6px; border-radius: 6px; }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 0;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* ── LEFT PANEL (list) ── */
.panel-left {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.panel-left::-webkit-scrollbar { width: 4px; }
.panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.list-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); z-index: 10;
}
.list-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.watch-count {
  background: rgba(255,107,53,0.15); color: var(--orange);
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
}

.watch-list { flex: 1; padding: 8px; }
.watch-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: 10px; cursor: pointer;
  border: 1px solid transparent; transition: all 0.2s; margin-bottom: 4px;
}
.watch-item:hover { background: var(--surface2); border-color: var(--border); }
.watch-item.active { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.3); }
.watch-thumb {
  width: 52px; height: 52px; border-radius: 8px; object-fit: cover;
  flex-shrink: 0; border: 1px solid var(--border);
}
.watch-thumb-placeholder {
  width: 52px; height: 52px; border-radius: 8px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.watch-meta { flex: 1; min-width: 0; }
.watch-meta h3 { font-size: 14px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.watch-meta .price { color: var(--orange); font-size: 13px; font-weight: 600; }
.watch-meta .img-count { color: var(--muted); font-size: 11px; margin-top: 2px; }
.watch-drag { color: var(--border); cursor: grab; font-size: 16px; padding: 4px; }

.add-btn-wrap { padding: 12px; border-top: 1px solid var(--border); }

/* ── RIGHT PANEL (editor) ── */
.panel-right {
  overflow-y: auto; background: var(--surface);
  display: flex; flex-direction: column;
}
.panel-right::-webkit-scrollbar { width: 4px; }
.panel-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.editor-wrap { padding: 24px; flex: 1; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: var(--muted); text-align: center;
}
.empty-icon { font-size: 48px; }
.empty-state h3 { font-size: 16px; color: var(--text); }
.empty-state p { font-size: 13px; }

/* ── EDITOR ── */
.editor-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: gap;
}
.editor-title { font-size: 18px; font-weight: 700; }

.field-group { margin-bottom: 18px; }
.field-label {
  display: block; font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 7px;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.field-input, .field-textarea, .field-select {
  width: 100%; padding: 10px 12px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: var(--sans); font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
.field-input:focus, .field-textarea:focus, .field-select:focus {
  border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
}
.field-textarea { resize: vertical; min-height: 70px; }

/* ── IMAGE SECTION ── */
.img-section { margin-bottom: 24px; }
.img-section-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.img-section-head h4 { font-size: 13px; font-weight: 600; color: var(--text); }
.img-hint { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.img-hint code {
  font-family: var(--mono); font-size: 10px;
  background: rgba(255,107,53,0.1); color: var(--orange);
  padding: 2px 6px; border-radius: 4px;
}

.img-url-list { display: flex; flex-direction: column; gap: 8px; }
.img-url-row {
  display: flex; gap: 8px; align-items: flex-start;
}
.img-url-input {
  flex: 1; padding: 9px 12px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: var(--mono); font-size: 12px;
  transition: all 0.2s; outline: none;
}
.img-url-input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
.img-url-input.valid { border-color: rgba(34,197,94,0.5); }
.img-url-input.invalid { border-color: rgba(239,68,68,0.5); }

.img-preview-row {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 8px; margin-top: 12px;
}
.img-preview-item {
  position: relative; aspect-ratio: 1; border-radius: 8px; overflow: hidden;
  border: 2px solid var(--border); cursor: pointer; transition: border-color 0.2s;
  background: var(--bg);
}
.img-preview-item:hover { border-color: var(--orange); }
.img-preview-item.main-img { border-color: var(--orange); }
.img-preview-item.main-img::after {
  content: '★'; position: absolute; top: 3px; right: 4px;
  font-size: 10px; color: var(--orange);
}
.img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.img-preview-item .img-del {
  position: absolute; bottom: 3px; right: 3px;
  background: rgba(239,68,68,0.9); color: white;
  border: none; border-radius: 4px; width: 18px; height: 18px;
  font-size: 10px; cursor: pointer; display: none;
  align-items: center; justify-content: center;
}
.img-preview-item:hover .img-del { display: flex; }
.img-preview-broken { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 22px; }

/* ── JSON EXPORT ── */
.json-section { margin-top: 28px; }
.json-section-head {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
}
.json-section-head h4 { font-size: 13px; font-weight: 600; }
.json-block {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; font-family: var(--mono); font-size: 11px; line-height: 1.7;
  color: #a0a0b0; max-height: 200px; overflow-y: auto; white-space: pre-wrap;
  word-break: break-all;
}
.json-block::-webkit-scrollbar { width: 3px; }
.json-block::-webkit-scrollbar-thumb { background: var(--border); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  padding: 12px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; color: white;
  opacity: 0; transform: translateY(10px);
  transition: all 0.3s; pointer-events: none;
  backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { background: rgba(34,197,94,0.9); }
.toast.err { background: rgba(239,68,68,0.9); }
.toast.info { background: rgba(255,107,53,0.9); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
  .panel-left { height: auto; max-height: 280px; }
  .panel-right { height: auto; }
  .editor-wrap { padding: 16px; }
  .field-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-dot">CS</div>
    <span class="brand-name">Watch<span>Admin</span></span>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="copyJSON()">📋 Copy JSON</button>
    <button class="btn btn-orange" onclick="downloadJSON()">⬇ Download data.json</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT: WATCH LIST -->
  <div class="panel-left">
    <div class="list-header">
      <h2>Watches</h2>
      <span class="watch-count" id="watchCount">0</span>
    </div>
    <div class="watch-list" id="watchList"></div>
    <div class="add-btn-wrap">
      <button class="btn btn-orange" style="width:100%;justify-content:center" onclick="addNew()">
        + New Watch
      </button>
    </div>
  </div>

  <!-- RIGHT: EDITOR -->
  <div class="panel-right">
    <div class="editor-wrap" id="editorWrap">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⌚</div>
        <h3>Select a watch to edit</h3>
        <p>Ya "New Watch" button dabao</p>
        <button class="btn btn-orange" style="margin-top:8px" onclick="addNew()">+ New Watch</button>
      </div>
      <div id="editorForm" style="display:none">
        <div class="editor-header">
          <div class="editor-title" id="editorTitle">New Watch</div>
          <button class="btn btn-red btn-sm" onclick="deleteWatch()">🗑 Delete</button>
        </div>

        <!-- BASIC FIELDS -->
        <div class="field-row">
          <div>
            <label class="field-label">Watch Name *</label>
            <input class="field-input" id="eName" type="text" placeholder="e.g. Black Classic" oninput="liveUpdate()">
          </div>
          <div>
            <label class="field-label">Price *</label>
            <input class="field-input" id="ePrice" type="text" placeholder="₹999" oninput="liveUpdate()">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Description</label>
          <textarea class="field-textarea" id="eDesc" placeholder="Short watch description..." oninput="liveUpdate()"></textarea>
        </div>

        <!-- IMAGES -->
        <div class="img-section">
          <div class="img-section-head">
            <h4>📸 Images (max 8)</h4>
            <button class="btn btn-ghost btn-sm" onclick="addImgRow()">+ Add URL</button>
          </div>
          <p class="img-hint">
            GitHub image URL format:<br>
            <code>https://raw.githubusercontent.com/anshyd1/Watch-Store/main/images/watch1/1.jpg</code>
            <br>Ya Unsplash, Cloudinary — koi bhi direct image URL chalega.
          </p>
          <div class="img-url-list" id="imgUrlList"></div>

          <!-- LIVE PREVIEW GRID -->
          <div class="img-preview-row" id="imgPreviewRow"></div>
        </div>

        <!-- SAVE -->
        <button class="btn btn-green" style="width:100%;justify-content:center;padding:12px" onclick="saveWatch()">
          ✓ Save Watch
        </button>

        <!-- JSON PREVIEW -->
        <div class="json-section">
          <div class="json-section-head">
            <h4>🔍 Live JSON Preview</h4>
            <button class="btn btn-ghost btn-sm" onclick="copyJSON()">Copy</button>
          </div>
          <div class="json-block" id="jsonBlock">{}</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let watches      = [];
let activeIdx    = null;
let editingData  = null; // current editor state

// ─────────────────────────────────────────────
//  INIT — try to load existing data.json
// ─────────────────────────────────────────────
(async function init() {
  try {
    const r = await fetch('data.json');
    if (!r.ok) throw new Error('no data.json');
    const d = await r.json();
    watches = d.watches || [];
    toast('data.json loaded ✓', 'ok');
  } catch {
    // start with sample
    watches = [
      { id: 1, name: "Black Classic", price: "₹999",
        desc: "Premium matte black dial. Perfect for daily wear.",
        images: [
          "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80",
          "https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=800&q=80",
          "https://images.unsplash.com/photo-1533139502658-0198f920d8e7?w=800&q=80"
        ]
      }
    ];
  }
  renderList();
})();

// ─────────────────────────────────────────────
//  RENDER LEFT LIST
// ─────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('watchList');
  document.getElementById('watchCount').textContent = watches.length;

  list.innerHTML = watches.map((w, i) => {
    const thumb = w.images && w.images[0] ? w.images[0] : null;
    const thumbEl = thumb
      ? `<img class="watch-thumb" src="${thumb}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      + `<div class="watch-thumb-placeholder" style="display:none">⌚</div>`
      : `<div class="watch-thumb-placeholder">⌚</div>`;
    return `
      <div class="watch-item ${i === activeIdx ? 'active' : ''}" onclick="selectWatch(${i})">
        ${thumbEl}
        <div class="watch-meta">
          <h3>${w.name || 'Untitled'}</h3>
          <div class="price">${w.price || '—'}</div>
          <div class="img-count">${(w.images||[]).length} image${(w.images||[]).length !== 1 ? 's' : ''}</div>
        </div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  SELECT / ADD / DELETE
// ─────────────────────────────────────────────
function selectWatch(idx) {
  activeIdx = idx;
  editingData = JSON.parse(JSON.stringify(watches[idx]));
  renderList();
  openEditor();
}

function addNew() {
  const newW = { id: Date.now(), name: '', price: '', desc: '', images: [] };
  watches.push(newW);
  activeIdx = watches.length - 1;
  editingData = JSON.parse(JSON.stringify(newW));
  renderList();
  openEditor();
}

function deleteWatch() {
  if (activeIdx === null) return;
  const name = watches[activeIdx].name || 'this watch';
  if (!confirm(`Delete "${name}"?`)) return;
  watches.splice(activeIdx, 1);
  activeIdx = null;
  editingData = null;
  renderList();
  document.getElementById('emptyState').style.display = '';
  document.getElementById('editorForm').style.display = 'none';
  toast('Watch deleted', 'err');
}

function saveWatch() {
  if (activeIdx === null) return;
  const name  = document.getElementById('eName').value.trim();
  const price = document.getElementById('ePrice').value.trim();
  if (!name)  { toast('Watch name likhna zaroori hai!', 'err'); document.getElementById('eName').focus(); return; }
  if (!price) { toast('Price likhna zaroori hai!', 'err'); document.getElementById('ePrice').focus(); return; }

  editingData.name  = name;
  editingData.price = price;
  editingData.desc  = document.getElementById('eDesc').value.trim();
  editingData.images = getImageURLs();

  watches[activeIdx] = JSON.parse(JSON.stringify(editingData));
  renderList();
  updateJSONPreview();
  toast('Watch saved ✓', 'ok');
}

// ─────────────────────────────────────────────
//  OPEN EDITOR — populate fields
// ─────────────────────────────────────────────
function openEditor() {
  document.getElementById('emptyState').style.display  = 'none';
  document.getElementById('editorForm').style.display  = '';
  document.getElementById('editorTitle').textContent   = editingData.name || 'New Watch';
  document.getElementById('eName').value  = editingData.name  || '';
  document.getElementById('ePrice').value = editingData.price || '';
  document.getElementById('eDesc').value  = editingData.desc  || '';

  // build image URL rows
  const imgList = document.getElementById('imgUrlList');
  imgList.innerHTML = '';
  const imgs = (editingData.images || []);
  if (imgs.length === 0) {
    addImgRow('');
  } else {
    imgs.forEach(url => addImgRow(url));
  }
  renderImgPreviews();
  updateJSONPreview();
}

// ─────────────────────────────────────────────
//  IMAGE URL ROWS
// ─────────────────────────────────────────────
let imgRowId = 0;

function addImgRow(url = '') {
  const list = document.getElementById('imgUrlList');
  const id   = 'imgrow-' + (++imgRowId);
  const row  = document.createElement('div');
  row.className = 'img-url-row';
  row.id = id;
  row.innerHTML = `
    <input class="img-url-input" type="url"
      placeholder="https://raw.githubusercontent.com/..."
      value="${url}"
      oninput="onUrlInput(this)"
      onpaste="setTimeout(()=>{ onUrlInput(this); renderImgPreviews(); }, 50)">
    <button class="btn btn-ghost btn-icon btn-sm" onclick="removeImgRow('${id}')" title="Remove">✕</button>
  `;
  list.appendChild(row);
  validateUrlInput(row.querySelector('input'));
}

function removeImgRow(rowId) {
  const el = document.getElementById(rowId);
  if (el) el.remove();
  renderImgPreviews();
  liveUpdate();
}

function onUrlInput(input) {
  validateUrlInput(input);
  renderImgPreviews();
  liveUpdate();
}

function validateUrlInput(input) {
  const v = input.value.trim();
  if (!v) { input.className = 'img-url-input'; return; }
  const ok = /^https?:\/\/.+\.(jpg|jpeg|png|webp|gif|svg)(\?.*)?$/i.test(v)
          || /^https?:\/\/.*unsplash\.com/.test(v)
          || /^https?:\/\/.*githubusercontent\.com/.test(v)
          || /^https?:\/\/.*cloudinary\.com/.test(v);
  input.className = 'img-url-input ' + (ok ? 'valid' : 'invalid');
}

function getImageURLs() {
  return [...document.querySelectorAll('.img-url-input')]
    .map(i => i.value.trim())
    .filter(Boolean);
}

function renderImgPreviews() {
  const urls    = getImageURLs();
  const preview = document.getElementById('imgPreviewRow');
  preview.innerHTML = urls.map((url, i) => `
    <div class="img-preview-item ${i === 0 ? 'main-img' : ''}">
      <img src="${url}" alt=""
        onload="this.parentElement.classList.add('loaded')"
        onerror="this.parentElement.innerHTML='<div class=img-preview-broken>❌</div>'">
      <button class="img-del" onclick="deleteImgByIdx(${i})">✕</button>
    </div>
  `).join('');
}

function deleteImgByIdx(idx) {
  const inputs = [...document.querySelectorAll('.img-url-input')];
  const target = inputs[idx];
  if (!target) return;
  const rowEl = target.closest('.img-url-row');
  if (rowEl) rowEl.remove();
  renderImgPreviews();
  liveUpdate();
}

// ─────────────────────────────────────────────
//  LIVE UPDATE (JSON preview + editor title)
// ─────────────────────────────────────────────
function liveUpdate() {
  const name = document.getElementById('eName').value.trim();
  document.getElementById('editorTitle').textContent = name || 'New Watch';
  updateJSONPreview();
}

function updateJSONPreview() {
  const snapshot = {
    watches: watches.map((w, i) => {
      if (i === activeIdx) {
        return {
          id:     w.id,
          name:   document.getElementById('eName').value.trim()  || w.name,
          price:  document.getElementById('ePrice').value.trim() || w.price,
          desc:   document.getElementById('eDesc').value.trim()  || w.desc,
          images: getImageURLs()
        };
      }
      return w;
    })
  };
  document.getElementById('jsonBlock').textContent = JSON.stringify(snapshot, null, 2);
}

// ─────────────────────────────────────────────
//  EXPORT
// ─────────────────────────────────────────────
function buildFinalJSON() {
  // auto-save current editor state before export
  if (activeIdx !== null) {
    watches[activeIdx] = {
      ...watches[activeIdx],
      name:   document.getElementById('eName').value.trim(),
      price:  document.getElementById('ePrice').value.trim(),
      desc:   document.getElementById('eDesc').value.trim(),
      images: getImageURLs()
    };
  }
  return JSON.stringify({ watches }, null, 2);
}

function downloadJSON() {
  const blob = new Blob([buildFinalJSON()], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'data.json';
  a.click();
  toast('data.json download ho raha hai ⬇', 'ok');
}

function copyJSON() {
  navigator.clipboard.writeText(buildFinalJSON())
    .then(() => toast('JSON copied! Paste karo GitHub pe ✓', 'ok'))
    .catch(() => toast('Copy failed — manually select karo', 'err'));
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let _tt;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast show ${type}`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
