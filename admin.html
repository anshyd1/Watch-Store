<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Watch Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      font-family: 'Segoe UI', sans-serif; 
      max-width: 600px; 
      margin: 20px auto; 
      padding: 20px; 
      text-align: center;
      background: #f8f9fa;
    }
    input, button { 
      padding: 12px; 
      margin: 10px 0; 
      width: 100%; 
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      background: #4a5568;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #2d3748;
    }
    .gallery { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
      margin-top: 20px; 
      justify-content: center;
    }
    .photo-item {
      text-align: center;
      width: 120px;
    }
    .photo-item img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #eee;
    }
    .delete-btn {
      background: red !important;
      font-size: 12px !important;
      padding: 5px !important;
      margin-top: 5px !important;
    }
    h1 { color: #2d3748; }
    h3 { color: #4a5568; margin-top: 25px; }
  </style>
</head>
<body>

  <!-- 🔐 Password Check -->
  <script>
    const correctPassword = "watchadmin"; // ← Yahan apna password daalein (change karein)
    const entered = prompt("Admin Password?");
    if (entered !== correctPassword) {
      document.body.innerHTML = "<h2 style='color:red'>❌ Access Denied</h2>";
      throw new Error("Access denied");
    }
  </script>

  <h1>📷 Watch Store Admin</h1>
  <p><small>Upload & Delete Photos</small></p>

  <input type="file" id="fileInput" accept="image/*" />
  <button onclick="upload()">📤 Upload Photo</button>

  <h3>All Photos</h3>
  <div id="gallery" class="gallery"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ✅ Your Supabase Details
    const supabaseUrl = 'https://eslcxatvwszqvzxnfuij.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzbGN4YXR2d3N6cXZ6eG5mdWlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTgzMjQsImV4cCI6MjA5MzE5NDMyNH0.qzsMQt8zJF2nseV8v7KMNRCRqH2iI-T_Scl9Beh0AA8';

    const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    async function upload() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) return alert("⚠️ Please select a photo");

      const fileName = 'watch_' + Date.now() + '.' + file.name.split('.').pop();

      const { data, error } = await supabase.storage
        .from('photos')
        .upload(fileName, file);

      if (error) {
        console.error("Upload Error:", error);
        alert("❌ Error: " + error.message);
      } else {
        alert("✅ Uploaded successfully!");
        loadPhotos();
        fileInput.value = ''; // Clear input
      }
    }

    async function loadPhotos() {
      const { data, error } = await supabase.storage
        .from('photos')
        .list('', { limit: 100, offset: 0 });

      if (error) {
        console.error("Load Error:", error);
        document.getElementById('gallery').innerHTML = "<p>❌ Can't load photos</p>";
        return;
      }

      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      if (data.length === 0) {
        gallery.innerHTML = "<p>No photos yet</p>";
        return;
      }

      data.forEach(file => {
        const filePath = `https://eslcxatvwszqvzxnfuij.supabase.co/storage/v1/object/public/photos/${file.name}`;
        
        const div = document.createElement('div');
        div.className = 'photo-item';
        div.innerHTML = `
          <img src="${filePath}" alt="watch" onerror="this.src='https://via.placeholder.com/120?text=Error';"/>
          <button class="delete-btn" onclick="del('${file.name}')">🗑️ Delete</button>
        `;
        gallery.appendChild(div);
      });
    }

    async function del(filename) {
      if (!confirm(`Delete "${filename}"? This cannot be undone.`)) return;

      const { error } = await supabase.storage
        .from('photos')
        .remove([filename]);

      if (error) {
        alert("❌ Delete failed: " + error.message);
      } else {
        alert("✅ Deleted!");
        loadPhotos();
      }
    }

    // Load photos when page opens
    window.onload = loadPhotos;
  </script>
</body>
</html>
